name: CI

# Trigger on push to any branch and on pull requests
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Cancel in-progress runs for the same workflow and PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Check code formatting (if applicable)
        working-directory: backend
        run: |
          echo "No linting configured yet. Add eslint or prettier in the future."
          echo "Skipping lint for now."

  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    # Test against multiple Node versions
    strategy:
      matrix:
        node-version: ['18', '20']
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Docker images with layer caching
      - name: Build Docker images
        uses: docker/bake-action@v4
        with:
          files: |
            docker-compose.yml
          load: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      # Start services using docker-compose
      - name: Start Docker Compose environment
        run: |
          docker compose up -d
          echo "Waiting for services to be healthy..."
          sleep 10

      # Health check test
      - name: Health check test
        run: |
          # Wait up to 60 seconds for backend to be healthy
          for i in {1..12}; do
            if curl -f http://localhost:3000/health; then
              echo "✅ Health check passed!"
              break
            else
              echo "⏳ Waiting for backend to be ready... (attempt $i/12)"
              sleep 5
            fi
            if [ $i -eq 12 ]; then
              echo "❌ Health check failed after 60 seconds"
              docker compose logs
              exit 1
            fi
          done

      # Test API endpoints
      - name: Test API endpoints
        run: |
          echo "Testing root endpoint..."
          curl -f http://localhost:3000/ | jq .

          echo "Testing /api/hello endpoint..."
          curl -f http://localhost:3000/api/hello | jq .

          echo "✅ All API tests passed!"

      # Show logs for debugging (if tests fail)
      - name: Show Docker logs on failure
        if: failure()
        run: docker compose logs

      # Cleanup
      - name: Stop Docker Compose environment
        if: always()
        run: docker compose down -v

  docker-security:
    name: Docker Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build backend image for scanning
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: demoagor-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Security scan using Trivy
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: demoagor-backend:ci
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, build-and-test, docker-security]
    if: always()

    steps:
      - name: Check job status
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build & Test: ${{ needs.build-and-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scan: ${{ needs.docker-security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.lint.result }}" == "success" ]] && \
             [[ "${{ needs.build-and-test.result }}" == "success" ]] && \
             [[ "${{ needs.docker-security.result }}" == "success" ]]; then
            echo "✅ All checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some checks failed. Please review the logs." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
